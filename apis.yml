description: 'Kajabi is an all-in-one creator platform that enables entrepreneurs
  and knowledge creators to build, market, and sell digital products including online
  courses, membership sites, coaching programs, and communities. The Kajabi Public
  API provides a RESTful interface for managing contacts, products, offers, purchases,
  orders, transactions, forms, webhooks, and more. API access requires OAuth 2.0 authentication
  and is available exclusively on the Pro plan. The API base URL is https://api.kajabi.com
  with versioned endpoints under /v1, and an OpenAPI specification is published in
  the public_api_docs GitHub repository.

  '
